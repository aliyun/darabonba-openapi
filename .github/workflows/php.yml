name: PHP CI

on:
  push:
    branches: [ master, main ]

  pull_request:
    branches: [ master, main ]

defaults:
  run:
    shell: bash
    working-directory: php

jobs:
  test:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest]
        php-versions: ['5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3']
    
    name: PHP ${{ matrix.php-versions }} Test on ${{ matrix.operating-system }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: mbstring, intl, json
        ini-values: post_max_size=256M, max_execution_time=180
        coverage: none
        tools: composer:v2

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-versions }}-

    - name: Install dependencies
      run: |
        if php -r 'exit(version_compare(PHP_VERSION, "7.2.0", "<") ? 0 : 1);'; then
          composer require --dev phpunit/phpunit:^5.7.27 --no-update
        elif php -r 'exit(version_compare(PHP_VERSION, "7.3.0", "<") ? 0 : 1);'; then
          composer require --dev phpunit/phpunit:^8.5.28 --no-update
        else
          composer require --dev phpunit/phpunit:^9.6.19 --no-update
        fi
        # guzzlehttp/psr7 >= 2.7 tightened Uri::validateHost() and now rejects
        # "host:port" strings that alibabacloud/darabonba (Request.php:82) still
        # feeds into Uri::withHost(), breaking every test that points at a local
        # mock server (e.g. 127.0.0.1:8000). Pin <2.7 here without touching the
        # committed composer.json. PHP 5.6/7.0/7.1 fall back to psr7 ^1.9 (psr7
        # v2 needs PHP >=7.2.5).
        #
        # Also pin guzzlehttp/guzzle <7.9 because guzzle 7.9+ hard-requires
        # psr7 ^2.7+, which would defeat the psr7 pin above. guzzle 6.x stays
        # eligible for the PHP 5.6/7.0/7.1 row (it's transitively required by
        # alibabacloud/credentials for those PHP versions).
        #
        # Composer 2.8+ blocks installs of versions covered by security
        # advisories (config.policy.advisories.block, default on). The older
        # psr7 line we need is flagged. `composer config` doesn't accept this
        # nested key, so flip it ephemerally on the runner with jq (jq is
        # preinstalled on GitHub-hosted ubuntu-latest); the project file in
        # the repo stays untouched.
        jq '.config.policy.advisories.block = false' composer.json > composer.json.tmp \
          && mv composer.json.tmp composer.json
        # WebSocket support lives in tea-php PR branch until alibabacloud/darabonba is published.
        composer config repositories.tea-php vcs https://github.com/aliyun/tea-php
        composer require alibabacloud/darabonba:dev-feature/aone-83973983-websocket --no-update
        # tea-php declares minimum-stability dev; on PHP 5.6/7.0/7.1 that can resolve
        # guzzle 6.5.x-dev instead of 6.5.8 and break SSE streaming in callSSEApi.
        if php -r 'exit(version_compare(PHP_VERSION, "7.2.0", "<") ? 0 : 1);'; then
          composer require \
            'guzzlehttp/psr7:1.9.1' \
            'guzzlehttp/guzzle:6.5.8' \
            'guzzlehttp/promises:1.5.3' \
            --no-update
        else
          composer require \
            'guzzlehttp/psr7:^1.9 || >=2.0,<2.7' \
            'guzzlehttp/guzzle:^6.3 || >=7.0,<7.9' \
            --no-update
        fi
        composer update --prefer-stable --prefer-dist --no-progress --no-interaction

    - name: Run syntax check
      run: find src tests -name "*.php" -exec php -l {} \;

    - name: Run PHPUnit tests
      run: composer test:all

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl
        coverage: none
        tools: composer:v2, phpstan

    - name: Install dependencies
      run: |
        composer require --dev phpunit/phpunit:^9.6.19 --no-update
        jq '.config.policy.advisories.block = false' composer.json > composer.json.tmp \
          && mv composer.json.tmp composer.json
        composer config repositories.tea-php vcs https://github.com/aliyun/tea-php
        composer require alibabacloud/darabonba:dev-feature/aone-83973983-websocket --no-update
        composer require \
          'guzzlehttp/psr7:^1.9 || >=2.0,<2.7' \
          'guzzlehttp/guzzle:^6.3 || >=7.0,<7.9' \
          --no-update
        composer update --prefer-stable --prefer-dist --no-progress --no-interaction

    - name: Run PHPStan
      run: |
        if [ -f "phpstan.neon" ]; then
          vendor/bin/phpstan analyse --memory-limit=512M || true
        else
          echo "PHPStan configuration not found, skipping..."
        fi
      continue-on-error: true

  coverage:
    runs-on: ubuntu-latest
    name: Code Coverage
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl
        coverage: xdebug

    - name: Install dependencies
      run: |
        composer require --dev phpunit/phpunit:^9.6.19 --no-update
        # See the test job for rationale; pin psr7 < 2.7 (and guzzle < 7.9 to
        # keep the transitive psr7 constraint compatible) at workflow level so
        # tests targeting 127.0.0.1:<port> mock servers keep working. Disable
        # the advisory install block ephemerally with jq too — see test job.
        jq '.config.policy.advisories.block = false' composer.json > composer.json.tmp \
          && mv composer.json.tmp composer.json
        # WebSocket support lives in tea-php PR branch until alibabacloud/darabonba is published.
        composer config repositories.tea-php vcs https://github.com/aliyun/tea-php
        composer require alibabacloud/darabonba:dev-feature/aone-83973983-websocket --no-update
        composer require \
          'guzzlehttp/psr7:^1.9 || >=2.0,<2.7' \
          'guzzlehttp/guzzle:^6.3 || >=7.0,<7.9' \
          --no-update
        composer update --prefer-stable --prefer-dist --no-progress --no-interaction

    - name: Run tests with coverage
      run: vendor/bin/phpunit --coverage-clover=coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true