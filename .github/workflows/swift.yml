name: Swift CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: swift

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Swift version
      run: swift --version

    - name: Build
      run: swift build

    - name: Test
      run: swift test
