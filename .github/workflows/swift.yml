name: Swift CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

defaults:
  run:
    shell: bash
    working-directory: swift

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.6", "5.7", "5.8", "5.9"]

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ matrix.swift }}

    - name: Build
      run: swift build

    - name: Test
      run: swift test
