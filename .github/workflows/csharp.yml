name: C# CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

defaults:
  run:
    shell: bash
    working-directory: csharp/OpenApiClientUnitTests

jobs:
  test:
    runs-on: ubuntu-latest
    name: C# Unit Tests

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Darabonba 1.0.3 (DoSSEActionAsync / ReadAsSSEAsync) is not on nuget.org yet.
    # Pack from tea-csharp until that release is published, then this checkout+pack can be removed.
    - name: Checkout tea-csharp for Darabonba 1.0.3
      uses: actions/checkout@v4
      with:
        repository: aliyun/tea-csharp
        ref: 646f307f6e4848ef8bf6d7c3e3f17b88e04864cc
        path: _deps/tea-csharp

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        # Include tea-csharp pin: Darabonba stays 1.0.3 while bits change across pins.
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}-tea-646f307f6e4848ef8bf6d7c3e3f17b88e04864cc
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Pack local Darabonba
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p csharp/local-nuget
        # Evict cached Darabonba 1.0.3 from older tea-csharp pins (same version, different bits).
        # Otherwise restore keeps the stale global package and skips the freshly packed nupkg.
        rm -rf "${HOME}/.nuget/packages/darabonba"
        dotnet pack _deps/tea-csharp/Darabonba/Darabonba.csproj -c Release -o csharp/local-nuget

    - name: Restore dependencies
      run: |
        dotnet restore \
          --source "${{ github.workspace }}/csharp/local-nuget" \
          --source https://api.nuget.org/v3/index.json

    - name: Run tests
      run: dotnet test -f net8.0 --no-restore --verbosity normal
