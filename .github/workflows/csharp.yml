name: C# CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

defaults:
  run:
    shell: bash
    working-directory: csharp/OpenApiClientUnitTests

jobs:
  test:
    runs-on: ubuntu-latest
    name: C# Unit Tests

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    # CallAsyncSSEApi on netstandard2.0 needs Darabonba with DARA_ASYNC_ENUMERABLES_API
    # (Microsoft.Bcl.AsyncInterfaces). Until that tea release is on nuget.org, pack from the
    # companion tea-csharp branch (same Aone #84494462).
    - name: Pack local Darabonba (async enumerables)
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        TEA_REF="${TEA_CSHARP_REF:-feature/aone-84494462-async-enumerables-api}"
        git clone --depth 1 -b "$TEA_REF" https://github.com/aliyun/tea-csharp.git /tmp/tea-csharp
        mkdir -p /tmp/local-nuget
        dotnet pack /tmp/tea-csharp/Darabonba/Darabonba.csproj -c Release -o /tmp/local-nuget
        # Prefer local nupkg over nuget.org for this restore
        rm -rf ~/.nuget/packages/darabonba/1.0.2 || true

    - name: Restore dependencies
      run: |
        dotnet restore -s /tmp/local-nuget -s https://api.nuget.org/v3/index.json

    - name: Build openapi netstandard2.0
      working-directory: csharp/core
      run: |
        dotnet build -c Release -f netstandard2.0 --no-restore

    - name: Run tests
      run: dotnet test -f net8.0 --no-restore --verbosity normal
